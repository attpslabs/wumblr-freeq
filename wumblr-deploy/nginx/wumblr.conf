# Reverse proxy for the wumblr stack.
#
# Routes:
#   api.wumblr.com/verify/.well-known/did.json → issuer (did:web doc)
#   api.wumblr.com/credentials/*               → issuer (VC issuance)
#   api.wumblr.com/*                           → backend (closed product API)
#   auth.wumblr.com/*                          → broker (OAuth orchestrator)
#   irc.wumblr.com/*                           → freeq (WebSocket transport)
#
# Cloudflare terminates the public TLS; this proxy terminates again on the
# origin (Cloudflare → nginx) using a Cloudflare-issued origin cert mounted
# at /etc/nginx/tls/. Mode "Full (strict)" on Cloudflare ensures the cert is
# validated.
#
# Container DNS — nginx resolves `backend`, `broker`, `freeq`, `issuer` via
# Docker's embedded DNS on the shared `wumblr` network. `backend` is declared
# in a sibling compose file (the closed product); the other three are
# declared in this same compose file.

server {
    listen 443 ssl;
    http2 on;
    server_name api.wumblr.com;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Issuer DID document — must be served at exactly this path for did:web
    # resolution. `did:web:api.wumblr.com:verify` resolves to
    # https://api.wumblr.com/verify/.well-known/did.json.
    location = /verify/.well-known/did.json {
        proxy_pass http://issuer:3090/verify/.well-known/did.json;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # Credential issuance — HMAC-authed POST. Only the wumblr backend
    # should be calling this; the HMAC keeps it off-limits even though
    # the route is public.
    location /credentials/ {
        proxy_pass http://issuer:3090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # Everything else on api.wumblr.com → wumblr-backend (closed product).
    # The `backend` service is declared in the closed compose file; it joins
    # the same `wumblr` docker network when both compose files are run
    # together.
    location / {
        proxy_pass http://backend:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
    }
}

# freeq-auth-broker — OAuth dance (login/callback/session). Standard HTTPS
# proxy, no WebSocket. Cloudflare-proxied (orange-cloud) is fine.
server {
    listen 443 ssl;
    http2 on;
    server_name auth.wumblr.com;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://broker:3080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
    }
}

# wumblr-freeq IRC-over-WebSocket. DNS-only on Cloudflare (gray-cloud) to
# avoid the proxy's idle-timeout cap on WebSockets. The upgrade headers
# (Upgrade + Connection) are mandatory for the WS handshake to complete;
# proxy_read_timeout extended to 1h so an idle connection isn't dropped.
server {
    listen 443 ssl;
    http2 on;
    server_name irc.wumblr.com;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://freeq:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }
}

# Bare HTTP → HTTPS redirect. Cloudflare normally handles this but if a
# misconfigured client hits the origin directly we want a clean 308.
server {
    listen 80 default_server;
    server_name _;
    return 308 https://$host$request_uri;
}
